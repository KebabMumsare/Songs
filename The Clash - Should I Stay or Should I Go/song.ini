loading_phrase = It was written in 1981 and featured Mick Jones on lead vocals. It became the band’s only number-one single on the UK Singles Chart, a decade after it was originally released. The song contains backing vocals in Spanish due to Joe Strummer’s fondness for Spain and its language. "On the spur of the moment I said “I’m going to do the backing vocals in Spanish” We needed a translator so Eddie Garcia, the tape operator, called his mother in Brooklyn Heights and read her the lyrics over the phone and she translated them. But Eddie and his mum are Ecuadorian, so it’s Ecuadorian Spanish that me and Joe Ely are singing on the backing vocals." -Joe Strummer, 1991
